services:
  processor1:
    container_name: data-processor-60s
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - KAFKA_HOST=${KAFKA_HOST:-kafka}
      - KAFKA_PORT=${KAFKA_PORT:-9092}
      - WINDOW_DURATION=60
      - SLIDE_INTERVAL=${SLIDE_INTERVAL_60:-60}
      - ALLOWED_LATENESS=20
      - EMPTY_WINDOW_STRATEGY=${EMPTY_WINDOW_STRATEGY:-SKIP}
      - GROUP_TTL_SECONDS=${GROUP_TTL_SECONDS:-}
    networks:
      - nwdaf-network
